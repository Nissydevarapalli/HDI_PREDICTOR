<!DOCTYPE html>
<html>
<head>
    <title>HDI Predictor</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
            background-color: #f4f6f9;
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #2c7be5;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a5dcc;
        }

        h2 {
            color: #333;
        }

        h3 {
            margin-top: 20px;
            color: green;
        }
    </style>
</head>

<body>

    <h2>Human Development Index Predictor</h2>

    <form action="/predict" method="POST">

        <input type="number" name="rank" placeholder="Enter HDI Rank (2021)" required>

        <br>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
